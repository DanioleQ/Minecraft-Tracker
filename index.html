<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Minecraft</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Chongqing Project</h1>

      <div
        id="dropZone"
        style="
          margin-bottom: 20px;
          padding: 25px;
          border: 2px dashed #555;
          border-radius: 10px;
          text-align: center;
          color: #aaa;
          cursor: pointer;
        "
      >
        Przeciągnij plik z tabelą tutaj lub kliknij aby wybrać
        <input type="file" id="fileInput" hidden />
      </div>
      <button
        onclick="clearAllBlocks()"
        style="background: #e53935; margin-bottom: 15px"
      >
        Usuń wszystkie bloki
      </button>
      <!-- HEADER jak lista -->
      <div class="header-row">
        <div>Nazwa bloku</div>
        <div>Do zebrania</div>
        <div>Zebrane</div>
      </div>
      <div id="blocksList"></div>

      <div class="progress-container">
        <h3 style="text-align: center">Postęp wszystkich bloków</h3>
        <div class="progress-bar">
          <div class="progress-text" id="progressText">0%</div>
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <script>
      // 📥 Wczytaj dane z localStorage przy starcie
      let blocks = JSON.parse(localStorage.getItem("minecraftBlocks")) || [];

      // 🎨 Narysuj UI na podstawie danych
      renderBlocks();
      // 📁 Pobierz input pliku
      const fileInput = document.getElementById("fileInput");
      const dropZone = document.getElementById("dropZone");

      // 🖱 Kliknięcie w dropZone → otwiera wybór pliku
      dropZone.addEventListener("click", () => {
        fileInput.click();
      });

      // 📂 Wybór pliku przez okno
      fileInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        handleFile(file); // 👉 przekazanie do głównej funkcji
      });

      // 📦 Przeciąganie pliku nad strefą
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "#4caf50";
        dropZone.style.color = "#4caf50";
      });

      // 📦 Wyjście kursora
      dropZone.addEventListener("dragleave", () => {
        dropZone.style.borderColor = "#555";
        dropZone.style.color = "#aaa";
      });

      // 📦 Upuszczenie pliku
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "#555";
        dropZone.style.color = "#aaa";

        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });
      // 📄 Główna funkcja obsługująca plik
      function handleFile(file) {
        const reader = new FileReader();

        reader.onload = function (event) {
          const text = event.target.result;
          const lines = text.split("\n");

          // 🧹 Wyczyść stare dane
          blocks = [];

          // 🔍 Parsowanie każdej linii
          lines.forEach((line) => {
            if (!line.includes("|")) return;

            const cols = line.split("|").map((c) => c.trim());

            const item = cols[1];
            const total = parseInt(cols[2]);

            // 🚫 Pomijamy nagłówek
            if (item === "Item") return;

            // ✅ Dodaj blok
            if (item && !isNaN(total)) {
              blocks.push({
                name: item,
                required: total,
                collected: 0,
              });
            }
          });

          // 🎨 Odśwież UI
          renderBlocks();

          // 💾 Zapisz dane
          saveData();
        };

        reader.readAsText(file);
      }
      // 🎨 Generuje HTML na podstawie danych
      function renderBlocks() {
        const list = document.getElementById("blocksList");
        list.innerHTML = "";

        blocks.forEach((block, index) => {
          const div = document.createElement("div");
          div.className = "block";

          div.innerHTML = `
      <div><strong>${block.name}</strong></div>
      <div>${block.required}</div>
      <div>${block.collected}</div>

      <!-- ➕ Dodawanie zebranych bloków -->
      <input id="add-${index}" type="number" placeholder="Dodaj"
        onkeydown="if(event.key==='Enter') addCollected(${index})">

      <!-- ❌ Usuwanie bloku -->
      <button class="delete-btn" onclick="deleteBlock(${index})">Usuń</button>
    `;

          list.appendChild(div);
        });

        updateProgress();
      }
      // ➕ Dodaje ilość do istniejącego bloku
      function addCollected(index) {
        const input = document.getElementById(`add-${index}`);
        let value = parseInt(input.value);

        if (isNaN(value) || value <= 0) return;

        blocks[index].collected += value;

        // 🚫 Nie przekraczaj maxa
        if (blocks[index].collected > blocks[index].required) {
          blocks[index].collected = blocks[index].required;
        }

        input.value = "";

        renderBlocks();
        saveData();
      }
      // ❌ Usuwa jeden blok z listy
      function deleteBlock(index) {
        blocks.splice(index, 1);

        renderBlocks();
        saveData();
      }
      // 💾 Zapis do localStorage
      function saveData() {
        localStorage.setItem("minecraftBlocks", JSON.stringify(blocks));

        updateProgress();
      }
      // 📊 Aktualizacja paska postępu
      function updateProgress() {
        let totalRequired = 0;
        let totalCollected = 0;

        blocks.forEach((b) => {
          totalRequired += b.required;
          totalCollected += b.collected;
        });

        const percent = totalRequired
          ? Math.round((totalCollected / totalRequired) * 100)
          : 0;

        document.getElementById("progressFill").style.width = percent + "%";
        document.getElementById("progressText").textContent =
          percent + "% (" + totalCollected + " / " + totalRequired + ")";
      }
      // 🗑️ Usuwa wszystkie bloki z potwierdzeniem
      function clearAllBlocks() {
        const confirmDelete = confirm(
          "Czy na pewno chcesz usunąć WSZYSTKIE bloki?",
        );

        if (!confirmDelete) return; // ❌ użytkownik kliknął "Anuluj"

        blocks = []; // 🧹 wyczyść tablicę
        renderBlocks(); // 🎨 odśwież UI
        saveData(); // 💾 zapisz zmiany
      }
    </script>
  </body>
</html>
